<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ecossistema Completo - HUBX, AGF & ORBIT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: #ffffff;
            font-family: 'Inter', sans-serif;
        }

        /* Container da Imagem de Fundo Interativa */
        .bg-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            background-image: url('https://i.postimg.cc/cJBtV4Xk/Whats-App-Image-2026-04-20-at-10-03-16.jpg');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Hotspots Invisíveis (Áreas Clicáveis) */
        .hotspot {
            position: absolute;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.0);
            transition: all 0.3s ease;
            border-radius: 12px;
            z-index: 10;
        }

        /* Feedback visual ao passar o mouse */
        .hotspot:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: scale(1.005);
        }

        /* Área específica do HUBX */
        .area-hubx { 
            top: 15%; 
            left: 3%; 
            width: 19.5%; 
            height: 62%; 
            border: 2px solid transparent;
        }
        .area-hubx:hover {
            border: 2px solid rgba(124, 58, 237, 0.4);
            background: rgba(124, 58, 237, 0.05);
        }

        /* Área específica do AGF destacada na nova imagem */
        .area-agf { 
            top: 18%; 
            left: 24%; 
            width: 49.5%; 
            height: 58%; 
            border: 2px solid transparent;
        }
        .area-agf:hover {
            border: 2px solid rgba(37, 99, 235, 0.4);
            background: rgba(37, 99, 235, 0.05);
        }

        /* Área específica do ORBIT */
        .area-orbit { 
            top: 15%; 
            left: 78%; 
            width: 19.5%; 
            height: 62%; 
            border: 2px solid transparent;
        }
        .area-orbit:hover {
            border: 2px solid rgba(16, 185, 129, 0.4);
            background: rgba(16, 185, 129, 0.05);
        }

        /* Estilo do Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(12px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
            padding: 20px;
        }

        .modal-content {
            background: white;
            width: 100%;
            max-width: 900px;
            border-radius: 32px;
            overflow: hidden;
            box-shadow: 0 40px 80px -15px rgba(0, 0, 0, 0.7);
            animation: modalSlideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes modalSlideUp {
            from { opacity: 0; transform: translateY(50px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .btn-close {
            transition: transform 0.3s;
        }
        .btn-close:hover {
            transform: rotate(90deg);
        }
    </style>
</head>
<body>

    <div class="bg-container">
        <!-- Hotspots sobre a imagem de fundo -->
        <div onclick="openModal('hubx')" class="hotspot area-hubx" title="Abrir HUBX.html"></div>
        <div onclick="openModal('agf')" class="hotspot area-agf" title="Abrir AGF.html"></div>
        <div onclick="openModal('orbit')" class="hotspot area-orbit" title="Abrir ORBIT.html"></div>
    </div>

    <!-- Modal que exibe o conteúdo dos "arquivos" -->
    <div id="modal" class="modal-overlay" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <!-- Cabeçalho Dinâmico -->
            <div id="modal-header" class="p-8 flex justify-between items-center text-white">
                <div>
                    <h2 id="modal-title" class="text-3xl font-black uppercase tracking-tight"></h2>
                    <p id="modal-subtitle" class="opacity-90 text-sm font-medium mt-1"></p>
                </div>
                <button onclick="closeModal()" class="btn-close p-2 bg-white/20 hover:bg-white/40 rounded-full transition-all">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                </button>
            </div>
            
            <!-- Corpo do Documento -->
            <div id="modal-body" class="p-10">
                <!-- Conteúdo injetado via JavaScript -->
            </div>

            <!-- Rodapé com status -->
            <div class="px-10 py-6 bg-gray-50 flex justify-between items-center border-t border-gray-100">
                <span class="text-xs font-bold text-gray-400 uppercase tracking-widest" id="file-status">Arquivo: index.html</span>
                <button onclick="closeModal()" class="px-8 py-2 bg-gray-900 text-white rounded-full text-sm font-bold hover:bg-black transition-all">
                    Fechar Documento
                </button>
            </div>
        </div>
    </div>

    <script>
        const documents = {
            hubx: {
                title: 'HUBX',
                subtitle: 'Inteligência de Demanda (Pré-Projeto)',
                color: 'bg-indigo-600',
                fileName: 'hubx.html',
                content: `
                    <div class="grid md:grid-cols-2 gap-10">
                        <div class="space-y-6">
                            <div class="flex items-start gap-4">
                                <div class="p-3 bg-indigo-50 rounded-xl text-indigo-600">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                                </div>
                                <div>
                                    <h4 class="font-bold text-gray-800">Interpretação</h4>
                                    <p class="text-gray-500 text-sm">Tradução da necessidade real do cliente em requisitos.</p>
                                </div>
                            </div>
                            <div class="flex items-start gap-4">
                                <div class="p-3 bg-indigo-50 rounded-xl text-indigo-600">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/></svg>
                                </div>
                                <div>
                                    <h4 class="font-bold text-gray-800">Estruturação</h4>
                                    <p class="text-gray-500 text-sm">Organização da demanda técnica e comercial.</p>
                                </div>
                            </div>
                        </div>
                        <div class="bg-indigo-900 p-8 rounded-3xl text-white flex flex-col justify-center">
                            <p class="text-indigo-200 text-xs font-bold uppercase mb-2">Ponto de Partida</p>
                            <h4 class="text-2xl font-black">ENTRADA: Necessidade do Cliente</h4>
                        </div>
                    </div>
                `
            },
            agf: {
                title: 'AGF',
                subtitle: 'Adaptive Gate Framework (Governança)',
                color: 'bg-blue-600',
                fileName: 'agf.html',
                content: `
                    <div class="space-y-10">
                        <div class="text-center max-w-2xl mx-auto">
                            <p class="text-gray-600 leading-relaxed text-lg italic">"A espinha dorsal da execução, garantindo que cada fase seja validada antes do avanço."</p>
                        </div>
                        
                        <div class="grid grid-cols-2 md:grid-cols-3 gap-6">
                            <div class="group p-6 bg-white border-2 border-gray-100 rounded-3xl hover:border-blue-500 transition-all text-center">
                                <div class="w-10 h-10 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center mx-auto mb-3 font-black">0</div>
                                <h5 class="font-bold text-gray-900 uppercase text-sm">Decisão</h5>
                                <p class="text-gray-400 text-xs mt-1">Fundação e Viabilidade</p>
                            </div>
                            <div class="group p-6 bg-white border-2 border-gray-100 rounded-3xl hover:border-blue-500 transition-all text-center">
                                <div class="w-10 h-10 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center mx-auto mb-3 font-black">1</div>
                                <h5 class="font-bold text-gray-900 uppercase text-sm">Planejamento</h5>
                                <p class="text-gray-400 text-xs mt-1">Estruturação da Solução</p>
                            </div>
                            <div class="group p-6 bg-white border-2 border-gray-100 rounded-3xl hover:border-blue-500 transition-all text-center">
                                <div class="w-10 h-10 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center mx-auto mb-3 font-black">2</div>
                                <h5 class="font-bold text-gray-900 uppercase text-sm">Preparação</h5>
                                <p class="text-gray-400 text-xs mt-1">Prontidão e Alinhamento</p>
                            </div>
                            <div class="group p-6 bg-white border-2 border-gray-100 rounded-3xl hover:border-blue-500 transition-all text-center">
                                <div class="w-10 h-10 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center mx-auto mb-3 font-black">3</div>
                                <h5 class="font-bold text-gray-900 uppercase text-sm">Execução</h5>
                                <p class="text-gray-400 text-xs mt-1">Construção e Configuração</p>
                            </div>
                            <div class="group p-6 bg-white border-2 border-gray-100 rounded-3xl hover:border-blue-500 transition-all text-center">
                                <div class="w-10 h-10 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center mx-auto mb-3 font-black">4</div>
                                <h5 class="font-bold text-gray-900 uppercase text-sm">Validação</h5>
                                <p class="text-gray-400 text-xs mt-1">Testes e Aceite</p>
                            </div>
                            <div class="group p-6 bg-white border-2 border-gray-100 rounded-3xl hover:border-blue-500 transition-all text-center">
                                <div class="w-10 h-10 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center mx-auto mb-3 font-black">5</div>
                                <h5 class="font-bold text-gray-900 uppercase text-sm">Go Live</h5>
                                <p class="text-gray-400 text-xs mt-1">Transição para Operação</p>
                            </div>
                        </div>

                        <div class="bg-blue-50 p-6 rounded-2xl border border-blue-100 text-center">
                            <p class="text-blue-900 font-bold">FOCO: Governança e Execução Completa do Projeto</p>
                        </div>
                    </div>
                `
            },
            orbit: {
                title: 'ORBIT',
                subtitle: 'Inteligência de Crescimento (Pós-Projeto)',
                color: 'bg-emerald-600',
                fileName: 'orbit.html',
                content: `
                    <div class="space-y-6">
                        <div class="bg-emerald-50 p-8 rounded-3xl border border-emerald-100">
                            <h4 class="font-bold text-emerald-900 mb-4 flex items-center gap-2">
                                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/></svg>
                                Inteligência Contínua
                            </h4>
                            <p class="text-emerald-800/80 leading-relaxed">Analisa comportamento, monitora operação e identifica novas oportunidades de expansão.</p>
                        </div>
                        <div class="p-6 bg-emerald-900 text-white rounded-2xl text-center">
                            <h5 class="text-2xl font-black uppercase">Saída: Novas Oportunidades</h5>
                        </div>
                    </div>
                `
            }
        };

        function openModal(docKey) {
            const doc = documents[docKey];
            const modal = document.getElementById('modal');
            const header = document.getElementById('modal-header');
            const title = document.getElementById('modal-title');
            const subtitle = document.getElementById('modal-subtitle');
            const body = document.getElementById('modal-body');
            const status = document.getElementById('file-status');

            header.className = `p-8 flex justify-between items-center text-white ${doc.color}`;
            title.innerText = doc.title;
            subtitle.innerText = doc.subtitle;
            body.innerHTML = doc.content;
            status.innerText = `Arquivo: ${doc.fileName}`;
            
            modal.style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
        }

        window.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeModal();
        });
    </script>
</body>
</html>
